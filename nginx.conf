# Sub-Store PHP 版 Nginx 伪静态配置
# 将此配置添加到宝塔面板 > 网站 > 设置 > 伪静态中

# 默认首页
index index.php index.html;

# 禁止访问隐藏文件
location ~ /\. {
    deny all;
    return 404;
}

# API 请求处理 - 所有 /api 开头的请求都转发到 index.php
location /api {
    try_files $uri $uri/ /index.php?$query_string;
}

# 下载请求处理 - /download 和 /share 路径也转发到 index.php
location /download {
    try_files $uri $uri/ /index.php?$query_string;
}

location /share {
    try_files $uri $uri/ /index.php?$query_string;
}

# 健康检查端点
location = /health {
    try_files $uri $uri/ /index.php?$query_string;
}

# 静态资源处理
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# PHP 处理
location ~ \.php$ {
    try_files $uri =404;
    # Windows 使用 TCP 端口（不是 Unix socket）
    # 宝塔面板默认 PHP 通常是 127.0.0.1:9000
    # 如果端口不对，请查看宝塔面板 > PHP > 设置 > PHP-FPM 配置中的 listen 项
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    
    # 设置超时时间
    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
}

# 默认路由 - 所有其他请求转发到 index.php
location / {
    try_files $uri $uri/ /index.php?$query_string;
}
